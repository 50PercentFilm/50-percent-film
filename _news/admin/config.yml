# =============================================================
#  50% Film — News & Reviews CMS configuration
# =============================================================

backend:
  name: git-gateway
  branch: main          # your repo's default branch is "main" — leave as is

# APPROVAL GATE: pieces are saved as drafts and move through
# Drafts -> In review -> Ready. Nothing is published until approved.
publish_mode: editorial_workflow

# Where writer-uploaded images are stored / served from.
media_folder: "uploads"
public_folder: "/uploads"

site_url: https://50percentfilm.com
display_url: https://50percentfilm.com
logo_url: https://50percentfilm.com/og-image.jpg

collections:
  - name: "news"
    label: "News & Reviews"
    label_singular: "Piece"
    description: "Write a new piece, fill in the fields, and Save. It goes to the editor for review before publishing."
    folder: "_news/posts"
    create: true
    slug: "{{slug}}"
    preview_path: "news/{{slug}}"
    summary: "{{title}}  —  {{category}}"
    sortable_fields: [date, title, category]
    fields:
      - label: "Headline"
        name: "title"
        widget: "string"
        hint: "The main headline, minus the italic word(s). e.g. 'The Social Network is the Most Important Movie of'"

      - label: "Italic accent (end of headline)"
        name: "title_accent"
        widget: "string"
        required: false
        hint: "Optional. The part shown in red italic, e.g. 'the 21st Century' or 'Vienna.'"

      - label: "Category"
        name: "category"
        widget: "select"
        options: ["News", "Review", "Interview", "Feature", "Festival", "Industry", "Essay"]

      - label: "Author"
        name: "author"
        widget: "relation"
        collection: "writers"
        search_fields: ["name"]
        value_field: "name"
        display_fields: ["name"]
        required: false
        hint: "Pick the writer. Add them in the Writers section first — their byline links to their profile page."

      - label: "Publish date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: true

      - label: "Standfirst / intro"
        name: "standfirst"
        widget: "text"
        required: false
        hint: "Optional one- or two-sentence intro shown under the headline."

      - label: "Hero image"
        name: "hero"
        widget: "image"
        required: false
        hint: "Optional full-width image at the top of the piece. Drag and drop or pick a file."

      - label: "Trailer / video link (YouTube)"
        name: "trailer_url"
        widget: "string"
        required: false
        pattern: ['youtube\.com|youtu\.be', "Please paste a YouTube link"]
        hint: "Optional. Adds a 'Watch trailer' link at the foot of the piece."

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        hint: "Short keywords at the foot of the piece — director names, themes, festival, etc."

      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "The piece itself. Use the toolbar for bold, italics, headings, quotes, and images."

  # -----------------------------------------------------------
  #  WRITERS — profile pages, linked from each piece's byline
  # -----------------------------------------------------------
  - name: "writers"
    label: "Writers"
    label_singular: "Writer"
    description: "Writer profiles. Each gets its own page, linked from their byline on every piece they write."
    folder: "_news/writers"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    preview_path: "writers/{{slug}}"
    summary: "{{name}}"
    sortable_fields: [name]
    fields:
      - label: "Name"
        name: "name"
        widget: "string"
        hint: "Full name as shown on the byline, e.g. 'Hayyan Khawaja'. Must match the name picked as Author on their pieces."

      - label: "Role / title"
        name: "role"
        widget: "string"
        required: false
        hint: "Optional, e.g. 'Co-founder & Writer' or 'Contributing Writer'."

      - label: "Photo"
        name: "photo"
        widget: "image"
        required: false
        hint: "Optional headshot. Shown top-left of the profile."

      - label: "Short bio"
        name: "bio"
        widget: "text"
        required: false
        hint: "A sentence or two shown at the top of the profile."

      - label: "Links"
        name: "links"
        widget: "list"
        required: false
        label_singular: "Link"
        summary: "{{fields.label}}"
        hint: "Add any links — High on Films, LinkedIn, Instagram, Letterboxd, a personal site, email. Each shows as a button, in order."
        fields:
          - label: "Label"
            name: "label"
            widget: "string"
            hint: "The button text, e.g. 'High on Films', 'LinkedIn', 'Instagram'."
          - label: "URL"
            name: "url"
            widget: "string"
            hint: "The full link, e.g. https://... (for email use mailto:name@example.com)"

      - label: "Longer bio (optional)"
        name: "body"
        widget: "markdown"
        required: false
        hint: "Optional longer profile text shown under the header."
